name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  build:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            exclude_flags: --exclude beckon-macos --exclude beckon-windows
          - os: macos-latest
            exclude_flags: --exclude beckon-linux --exclude beckon-windows
          - os: windows-latest
            exclude_flags: --exclude beckon-linux --exclude beckon-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace ${{ matrix.exclude_flags }} --all-targets
      - name: Test
        run: cargo test --workspace ${{ matrix.exclude_flags }}
      - name: Clippy
        run: cargo clippy --workspace ${{ matrix.exclude_flags }} --all-targets -- -D warnings
