# beckon bindings for Hyprland. Save at ~/.config/hypr/beckon.conf and
# add this line to your ~/.config/hypr/hyprland.conf:
#
#   source = ~/.config/hypr/beckon.conf
#
# Hyprland reloads automatically on file change.
#
# Discover ids on your machine:
#   beckon -L            list installed apps
#   beckon -l            list currently running apps
#   beckon -s claude     fuzzy search
#   beckon -r Claude     validate an id

$mainMod = SUPER

bind = $mainMod, Space, exec, beckon kitty
bind = $mainMod, C,     exec, beckon Claude
bind = $mainMod, B,     exec, beckon Brave
bind = $mainMod, E,     exec, beckon Cursor
bind = $mainMod, D,     exec, beckon Discord
